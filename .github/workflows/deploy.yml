name: 🚀 Deploy Frontend to Production

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: lequanghuy810/lamp-shop-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=${{ secrets.API_ENDPOINT }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            INTERNAL_API_ENDPOINT=http://backend:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔄 Pulling latest frontend image..."
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "🔄 Restarting frontend container..."
            cd ${{ secrets.PROJECT_DIR }}
            docker compose -f docker-compose.prod.yml up -d --no-build frontend

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Frontend deployed successfully!"
